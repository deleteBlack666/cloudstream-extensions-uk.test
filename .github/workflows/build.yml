name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "src"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout builds
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create builds branch if not exists
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/builds/.git" ]; then
            mkdir -p $GITHUB_WORKSPACE/builds
            cd $GITHUB_WORKSPACE/builds
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY.git
            git checkout --orphan builds
            git config --local user.email "actions@github.com"
            git config --local user.name "GitHub Actions"
            touch .gitkeep
            git add .
            git commit -m "Initial builds branch"
            git push origin builds
          fi

      - name: Clean old builds
        run: rm $GITHUB_WORKSPACE/builds/*.cs3 || true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          find . -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds \;
          cp build/plugins.json $GITHUB_WORKSPACE/builds

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY.git
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
